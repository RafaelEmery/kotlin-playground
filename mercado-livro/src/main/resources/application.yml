# Base/common configuration for the application.
# This file contains settings that are shared across all environments (e.g., development, testing, production).
spring:
  profiles:
    # The active profile is set to 'dev', indicating that the application will
    # use the development-specific configuration settings (application-dev)
    active: dev
  jpa:
    hibernate:
      # DDL Auto is a convenient way to automatically create, update, validate, or
      # drop the database schema based on the entity classes defined in the application.
      ddl-auto: none
    # show-sql is a property that, when set to true,
    # enables the logging of SQL statements generated by Hibernate.
    show-sql: true
  flyway:

    enabled: true
    # The baseline-on-migrate property is used to indicate that Flyway should create a baseline
    # version of the database schema when it encounters an existing schema that does not
    # have a version history.
    baseline-on-migrate: true
  jackson:
    # Jackson won't serialize properties with null values
    default-property-inclusion: non_null
jwt:
  secret: f312a2a6-f1a6-49a2-a358-548c2991b7e1
  expiration: 3600000