spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mercadolivro
    username: app
    password: app
  jpa:
    hibernate:
      # DDL Auto is a convenient way to automatically create, update, validate, or
      # drop the database schema based on the entity classes defined in the application.
      ddl-auto: update
    # show-sql is a property that, when set to true,
    # enables the logging of SQL statements generated by Hibernate.
    show-sql: true