services:
  mysql:
    image: mysql:8.4
    container_name: mercadolivro-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mercadolivro
      MYSQL_USER: app
      MYSQL_PASSWORD: app

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: